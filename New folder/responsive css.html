     <style>

    .parent{
        display: flex;
        gap:10px ;
        justify-content: center;
    }

    .item{
        background-color: red;
        height: 200px;
        width: 150px;
    }

    @media (max-width:600px){
        .parent{
            flex-direction: column;

        }
        .item{
            width:100%;
        }
    }

    @media (min-width:601px) and (max-width:992px)
    {
       .parent{flex-wrap: wrap ;} 
       .item{ width:49%;}
    }
     </style>  
     
     
</head>
<body>
    <h1>hello</h1>
    
    <div class="parent">
        <div class="item">item</div>
         <div class="item">item</div>
         <div class="item">item</div>
         <div class="item">item</div>
         <div class="item">item</div>
         <div class="item">item</div>
    </div>

</body>
