<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Images in Tables</title>
</head>
<body>
    
<h1>images in tables</h1>
<hr>
<br>
<b><span >what are your favorite pets?</span></b>
<br>
<br>

<table border="1" style="border-collapse: collapse; width: 400px">
    <thead>
    <tr>
        <th>pet image</th>
        <th>More fact about(as a link)</th>
    </tr>
</thead>
<tbody>
    <tr>
<td>
    <img src="horse image.jpg" alt="horse image"   width="200" >
</td>
<td>
    <a target ="blank " href="https://en.wikipedia.org/wiki/Horse">horses</a>
</td>
    </tr>
<td>
    <img src="dog image.jpg" alt="dog image"  width="200" >
</td>
<td>
    <a target ="blank "  href="https://en.wikipedia.org/wiki/Dog">dogs</a>
</td>
    <tr>

<td>
    <img src="cat image.jpg" alt="cat image"  width="200" >
</td>
<td>
    <a target ="blank" href="https://en.wikipedia.org/wiki/Cat">cats</a>
</td>
    </tr>

    <tr>

    </tr>
</tbody>
</table>











</body>
</html>
