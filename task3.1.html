<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration form</title>
</head>
<body>

    <h1>Registration form!</h1>
    <div style="border: 1px solid black; padding: 1px; width: 400px;">
       <form>
    <fieldset>
 <legend style="font-size: 22px"><b>personal details:</b></legend>
 <br>
 <hr>
 <br>
 <b><label for="first name">First name:</label></b>
 <input id="first name" type="text">
 <br>
 <br>
 <b><label for="last name">Last name:</label></b>
 <input id="last name" type="text">
 <br>
 <br>
 <b><label for="email">Email:</label></b>
 <input id="email" type="email"  placeholder="soso@gmail.com">
 <br>
 <br>
 <b><label>Gender:</label></b> 
<b><input type="radio">male</b>
<b><input type="radio">female</b>
 <br>
 <br>
  <b><label for="city">City:</label></b> 
  <select id="city">
 <option>Amman</option>
  <option>Irbed</option>
   <option>Ajloun</option>
 </select>
  <br>
 <br>
<input type="submit" value="sign up">
    </fieldset>
     </form>
</div>

</body>
</html>
